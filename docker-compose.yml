name: gestion-api
services:
  db:
    image: postgres:15-alpine
    container_name: gestion-db
    restart: always
    environment:
      POSTGRES_USER: gestion_api
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: gestion_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: gestion-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: api@gestion.com
      PGADMIN_DEFAULT_PASSWORD: 1234
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
